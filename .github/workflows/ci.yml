name: CI

on:
    pull_request:
    push:
        branches:
          - develop
          - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.python-version == '3.15' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14", "3.14t", "3.15"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          enable-cache: true

      - name: Install pandoc
        uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e
        with:
          version: 3.8.2

      - name: Setup workspace
        run: |
          make install

      - name: Check python packages
        if: ${{ matrix.python-version == '3.12' }}
        run: |
          make check-py

      - name: Test python packages
        run: |
          make test-py

      - name: Build python packages
        run: |
          make build-py

      - name: Build (and test) java packages
        run: |
          make build-java

      - name: Run protocol tests
        run: |
          make test-protocols
